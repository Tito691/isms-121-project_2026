<!DOCTYPE html>
<html lang="en">
    <head>
        <title>ISMS CatPhoto App</title>
    </head>
    <body>
        <main>
            <h1>CatPhoto App</h1>
            <section>
                <h2>Cat Photos</h2>
                <!-- 1000: Add links to cat photos-->
                <p>See More: <a href = "https://www.freecatphotoapp.com"
                    target="_blank">Cat photos</a> in our gallery</p>
                <a href="https://www.freecatphotoapp.com" target="blank"
                ><img src="https://bit.ly/fcc-relaxing-cat" alt="Relaxing cat">
                </a>
            </section>
            <section>
                <h2>Cat Lists</h2>
                <h3>Things cats love</h3>
                <ul>
                    <li>Catnip</li>
                    <li>Laser pointers</li>
                    <li>Fish</li>
                    <li>Milk</li>
                    <li>Lasagna</li>
                </ul>         
            </section>
            <section>
                <h2>Cat Form</h2>
                <form id="myCatForm" action="https://freecatphotoapp.com/submit-cat-form" method="post">
                    <label>
                        <input type="radio" name="indoor-outdoor"> Indoor
                    </label>
                    <label>
                        <input type="radio" name="indoor-outdoor"> Outdoor
                    </label><br>
                    <label>
                        <input type="checkbox" name="personality"> Loving
                        <input type="checkbox" name="personality"> Lazy
                        <input type="checkbox" name="personality"> Crazy
                    </label><br>
                    <button type="submit">Submit</button>
                </form> 
            </section>     
        </main>
    </body>
